name: Deploy to Vercel
on:
  push:
    branches: [main]
env:
  VERCEL_ORG_ID: team_dOhb6312wndMeuoDrn1XJXuo
  VERCEL_PROJECT_ID: prj_nSXCUADGGQn7sFBE2STgg3qfQTU9
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project locally
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        continue-on-error: true
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/deploy.txt; true

      - name: Verify deployment is READY
        run: |
          sleep 25
          STATUS=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['deployments'][0]['readyState'])")
          echo "Vercel deployment status: $STATUS"
          [ "$STATUS" = "READY" ] || (echo "Deploy failed" && exit 1)
