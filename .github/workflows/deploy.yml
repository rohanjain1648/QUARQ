name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mac Mini deploy
        run: |
          curl -s -X POST https://deploy.quarq.io/website \
            -H "Content-Type: application/json" \
            -d '{"secret":"${{ secrets.DEPLOY_WEBHOOK_SECRET }}"}'
          echo "Deploy triggered on Mac Mini"
